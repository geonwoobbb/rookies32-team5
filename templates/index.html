<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>포켓몬 도감</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--red:#E3350D;--yellow:#FFCB05;--black:#1a1a2e;--white:#FAFAFA;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--black);min-height:100vh;color:var(--white);}

    header{
      background:var(--red);padding:0 2rem;height:70px;
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:100;
      box-shadow:0 4px 20px rgba(227,53,13,.5);
    }
    .logo{font-family:'Black Han Sans',sans-serif;font-size:1.8rem;color:var(--yellow);
      letter-spacing:2px;display:flex;align-items:center;gap:10px;}
    .logo-ball{width:32px;height:32px;background:white;border-radius:50%;
      border:3px solid var(--yellow);position:relative;overflow:hidden;}
    .logo-ball::before{content:'';position:absolute;top:0;left:0;right:0;bottom:50%;background:var(--red);}
    .logo-ball::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:10px;height:10px;background:white;border-radius:50%;border:2px solid var(--yellow);z-index:2;}

    .header-right{display:flex;align-items:center;gap:1rem;}
    .fav-link{
      display:flex;align-items:center;gap:6px;text-decoration:none;
      background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
      color:var(--yellow);padding:6px 14px;border-radius:20px;
      font-family:'Black Han Sans',sans-serif;font-size:.85rem;
      transition:all .2s;
    }
    .fav-link:hover{background:rgba(255,203,5,.2);}
    .fav-badge{
      background:var(--yellow);color:var(--black);
      font-size:.7rem;font-weight:700;width:18px;height:18px;
      border-radius:50%;display:flex;align-items:center;justify-content:center;
    }

    .container{max-width:1200px;margin:0 auto;padding:2rem 1.5rem;}

    .filter-section{
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
      border-radius:16px;padding:1.2rem 1.5rem;margin-bottom:2rem;
      display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
    }
    .filter-label{font-family:'Black Han Sans',sans-serif;color:var(--yellow);font-size:.9rem;white-space:nowrap;}
    .type-filters{display:flex;flex-wrap:wrap;gap:8px;}
    .type-btn{
      padding:5px 14px;border-radius:20px;border:2px solid transparent;
      cursor:pointer;font-size:.78rem;font-weight:700;color:white;
      transition:all .2s;background:rgba(255,255,255,.1);
      font-family:'Noto Sans KR',sans-serif;
    }
    .type-btn:hover{transform:translateY(-2px);filter:brightness(1.2);}
    .type-btn.active{border-color:var(--yellow);box-shadow:0 0 10px rgba(255,203,5,.4);}
    .type-btn.all-btn{background:var(--yellow);color:var(--black);}

    .pokemon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1.2rem;}

    .pokemon-card{
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
      border-radius:16px;padding:1.2rem 1rem;text-align:center;
      transition:all .25s cubic-bezier(.34,1.56,.64,1);
      text-decoration:none;display:block;position:relative;overflow:hidden;
      animation:fadeUp .4s ease both;
    }
    .pokemon-card:hover{transform:translateY(-6px) scale(1.02);
      border-color:var(--yellow);box-shadow:0 12px 30px rgba(255,203,5,.2);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

    .card-img{width:100px;height:100px;object-fit:contain;
      filter:drop-shadow(0 4px 8px rgba(0,0,0,.3));
      transition:transform .3s;display:block;margin:0 auto .8rem;}
    .pokemon-card:hover .card-img{transform:translateY(-4px) scale(1.05);}
    .card-name{font-family:'Black Han Sans',sans-serif;font-size:1rem;margin-bottom:4px;}
    .card-eng{font-size:.7rem;color:rgba(255,255,255,.4);margin-bottom:8px;text-transform:capitalize;}
    .card-types{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;}
    .type-badge{font-size:.68rem;font-weight:700;padding:2px 10px;border-radius:10px;color:white;}

    /* 즐겨찾기 버튼 */
    .star-btn{
      position:absolute;top:8px;right:8px;
      background:rgba(0,0,0,.4);border:none;
      width:28px;height:28px;border-radius:50%;cursor:pointer;
      font-size:14px;line-height:28px;text-align:center;
      transition:all .2s;color:rgba(255,255,255,.4);
      z-index:2;
    }
    .star-btn:hover{background:rgba(255,203,5,.3);color:var(--yellow);transform:scale(1.2);}
    .star-btn.starred{color:var(--yellow);background:rgba(255,203,5,.2);}

    .count-display{font-size:.85rem;color:rgba(255,255,255,.6);}
    .empty-state{text-align:center;padding:4rem;color:rgba(255,255,255,.3);grid-column:1/-1;}

    /* 검색바 */
    .search-wrap{
      position:relative;margin-bottom:1.2rem;
    }
    .search-input{
      width:100%;padding:.85rem 1rem .85rem 3rem;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.15);
      border-radius:12px;color:var(--white);font-size:.95rem;
      font-family:'Noto Sans KR',sans-serif;
      transition:border-color .2s, box-shadow .2s;
      outline:none;
    }
    .search-input::placeholder{color:rgba(255,255,255,.3);}
    .search-input:focus{
      border-color:var(--yellow);
      box-shadow:0 0 0 3px rgba(255,203,5,.15);
    }
    .search-icon{
      position:absolute;left:1rem;top:50%;transform:translateY(-50%);
      font-size:1rem;color:rgba(255,255,255,.35);pointer-events:none;
    }
    .search-clear{
      position:absolute;right:.8rem;top:50%;transform:translateY(-50%);
      background:none;border:none;color:rgba(255,255,255,.35);
      font-size:1.1rem;cursor:pointer;padding:4px;line-height:1;
      display:none;transition:color .2s;
    }
    .search-clear:hover{color:var(--yellow);}

    /* 토스트 */
    #toast{
      position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);
      background:rgba(26,26,46,.95);border:1px solid rgba(255,203,5,.3);
      color:var(--yellow);padding:.7rem 1.5rem;border-radius:12px;
      font-family:'Black Han Sans',sans-serif;font-size:.9rem;
      opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap;
    }
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-ball"></div>포켓몬 도감</div>
  <div class="header-right">
    <a class="fav-link" href="/favorites">
      ⭐ 즐겨찾기
      <span class="fav-badge" id="fav-badge">{{ favorites|length }}</span>
    </a>
    <span class="count-display" id="count-display">{{ pokemon_list|length }}마리</span>
  </div>
</header>

<div class="container">
  <!-- 검색바 -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input"
      type="text" placeholder="포켓몬 이름으로 검색 (한글 / 영어)"/>
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>

  <div class="filter-section">
    <span class="filter-label">타입 필터</span>
    <div class="type-filters">
      <button class="type-btn all-btn active" data-type="">전체</button>
      {% for t in all_types %}
      <button class="type-btn" data-type="{{ t }}" style="background:{{ type_colors.get(t,'#888') }}">
        {{ type_ko.get(t,t) }}
      </button>
      {% endfor %}
    </div>
  </div>

  <div class="pokemon-grid" id="pokemon-grid">
    {% for p in pokemon_list %}
    <a class="pokemon-card" href="/pokemon/{{ p.id }}"
       data-types="{{ p.types|join(',') }}"
       data-name="{{ p.name }} {{ p.eng_name }}"
       style="animation-delay:{{ loop.index0 * 0.03 }}s">
      <button class="star-btn {% if p.favorited %}starred{% endif %}"
        id="star-{{ p.id }}"
        onclick="toggleFav(event,'{{ p.id }}')"
        title="즐겨찾기">★</button>
      <img class="card-img" src="{{ p.image }}" alt="{{ p.name }}" loading="lazy"/>
      <div class="card-name">{{ p.name }}</div>
      <div class="card-eng">{{ p.eng_name }}</div>
      <div class="card-types">
        {% for t in p.types %}
        <span class="type-badge" style="background:{{ type_colors.get(t,'#888') }}">{{ type_ko.get(t,t) }}</span>
        {% endfor %}
      </div>
    </a>
    {% endfor %}
  </div>
</div>

<div id="toast"></div>

<script>
  const MAX_FAV = {{ max_favorites }};

  // 검색
  const searchInput = document.getElementById('search-input');
  const searchClear = document.getElementById('search-clear');
  let activeType = '';

  function applyFilters() {
    const query = searchInput.value.trim().toLowerCase();
    searchClear.style.display = query ? 'block' : 'none';
    let visible = 0;
    document.querySelectorAll('.pokemon-card').forEach(card => {
      const types = card.dataset.types.split(',');
      const name  = card.dataset.name.toLowerCase();
      const typeOk = !activeType || types.includes(activeType);
      const nameOk = !query    || name.includes(query);
      const show = typeOk && nameOk;
      card.style.display = show ? 'block' : 'none';
      if (show) visible++;
    });
    document.getElementById('count-display').textContent = visible + '마리';
  }

  function clearSearch() {
    searchInput.value = '';
    applyFilters();
    searchInput.focus();
  }

  searchInput.addEventListener('input', applyFilters);

  // 타입 필터
  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeType = btn.dataset.type;
      applyFilters();
    });
  });

  // 즐겨찾기 토글
  async function toggleFav(e, name) {
    e.preventDefault(); e.stopPropagation();
    const res = await fetch('/api/favorite', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name})
    });
    if (res.status === 400) {
      showToast(`⚠️ 즐겨찾기는 최대 ${MAX_FAV}마리까지!`);
      return;
    }
    const data = await res.json();
    const btn = document.getElementById('star-' + name);
    if (data.status === 'added') {
      btn.classList.add('starred');
      showToast('⭐ 즐겨찾기에 추가됐어!');
    } else {
      btn.classList.remove('starred');
      showToast('☆ 즐겨찾기에서 제거됐어.');
    }
    document.getElementById('fav-badge').textContent = data.count;
  }

  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
