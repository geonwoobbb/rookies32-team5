<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>포켓몬 도감</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        /* 상단 바 */
        .top-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .top-bar input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            outline: none;
        }

        .top-bar select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .top-bar button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #4a90e2;
            color: white;
            cursor: pointer;
        }

        .top-bar button:hover {
            background: #357bd8;
        }

        /* 카드 영역 */
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        /* 링크 */
        .card-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        /* 카드 */
        .card {
            width: 180px;
            background: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 120px;
            height: 120px;
        }

        /* 숨김 */
        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

<h1>포켓몬 도감</h1>

<!-- 컨트롤 -->
<div class="top-bar">

    <input type="text" id="search" placeholder="🔍 이름 검색">

    <select id="typeFilter">
        <option value="">🌈 전체 타입</option>
        <option value="grass">grass</option>
        <option value="fire">fire</option>
        <option value="water">water</option>
        <option value="electric">electric</option>
        <option value="poison">poison</option>
    </select>

    <button onclick="sortByName()">🔤 정렬</button>

</div>

<!-- 카드 리스트 -->
<div class="container" id="list">

    {% for key, p in pokemon.items() %}

    <a href="/pokemon/{{ p.name }}" class="card-link">

        <div class="card"
             data-name="{{ p.name }}"
             data-types="{{ p.types|join(',') }}">

            <img src="{{ p.image }}" alt="{{ p.name }}">

            <h3>{{ p.name }}</h3>

            <p>{{ p.types | join(', ') }}</p>

        </div>

    </a>

    {% endfor %}

</div>

<script>

let asc = true;

/* 검색 */
document.getElementById("search").addEventListener("input", function () {
    let value = this.value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        let name = card.dataset.name.toLowerCase();
        let parent = card.parentElement;

        if (name.includes(value)) {
            parent.classList.remove("hidden");
        } else {
            parent.classList.add("hidden");
        }
    });
});

/* 타입 필터 */
document.getElementById("typeFilter").addEventListener("change", function () {
    let value = this.value;
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        let types = card.dataset.types;
        let parent = card.parentElement;

        if (!value || types.includes(value)) {
            parent.classList.remove("hidden");
        } else {
            parent.classList.add("hidden");
        }
    });
});

/* 정렬 */
function sortByName() {
    let container = document.getElementById("list");
    let cards = Array.from(container.children);

    cards.sort((a, b) => {
        let nameA = a.querySelector(".card").dataset.name;
        let nameB = b.querySelector(".card").dataset.name;

        return asc
            ? nameA.localeCompare(nameB)
            : nameB.localeCompare(nameA);
    });

    asc = !asc;

    cards.forEach(card => container.appendChild(card));
}

</script>

</body>
</html>
